name: Crisp
options:
  bundleIdPrefix: com.crisp
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.3"

targets:
  Crisp:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: SQLite.swift
        product: SQLite
    entitlements:
      path: Resources/Crisp.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.crisp.app

  CrispWidget:
    type: app-extension
    platform: iOS
    sources:
      - CrispWidget
    settings:
      base:
        INFOPLIST_FILE: CrispWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.app.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: CrispWidget/CrispWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.crisp.app
    dependencies:
      - target: Crisp
        embed: false

  CrispKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - CrispKeyboard
    settings:
      base:
        INFOPLIST_FILE: CrispKeyboard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.app.keyboard
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: CrispKeyboard/CrispKeyboard.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.crisp.app
    dependencies:
      - target: Crisp
        embed: false

  CrispWatch:
    type: application
    platform: watchOS
    sources:
      - CrispWatch/Sources
      - CrispWatch/Resources
    settings:
      base:
        INFOPLIST_FILE: CrispWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.app.watch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    entitlements:
      path: CrispWatch/CrispWatch.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.crisp.app
    dependencies:
      - target: Crisp
        embed: false

  CrispMac:
    type: application
    platform: macOS
    sources:
      - path: CrispMac/Sources
      - path: CrispMac/Resources
    settings:
      base:
        INFOPLIST_FILE: CrispMac/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.crisp.app.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        COMBINE_HIDPI_IMAGES: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - package: SQLite.swift
        product: SQLite
    entitlements:
      path: CrispMac/Resources/CrispMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.crisp.app
